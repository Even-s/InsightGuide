name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: insightguide
          POSTGRES_PASSWORD: insightguide
          POSTGRES_DB: insightguide_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (black)
        run: black --check .

      - name: Lint (isort)
        run: isort --check-only .

      - name: Type check
        run: mypy app/ --ignore-missing-imports

      - name: Test
        env:
          DATABASE_URL: postgresql://insightguide:insightguide@localhost:5432/insightguide_test
          OPENAI_API_KEY: sk-test-not-real
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
        run: pytest tests/ -x --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
